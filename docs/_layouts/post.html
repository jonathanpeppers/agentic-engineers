---
layout: default
---

<style>
    .post-content {
        max-width: 800px;
        margin: 0 auto;
        padding: 40px 24px;
        line-height: 1.8;
        font-size: 17px;
        color: #334155;
    }

    .post-content h1 {
        font-size: 32px;
        color: #1e293b;
        margin-bottom: 8px;
    }

    .post-content h2 {
        font-size: 24px;
        color: #1e293b;
        margin-top: 40px;
        margin-bottom: 16px;
    }

    .post-content h3 {
        font-size: 20px;
        color: #1e293b;
        margin-top: 32px;
        margin-bottom: 12px;
    }

    .post-content p {
        margin-bottom: 16px;
    }

    .post-content a {
        color: #4338ca;
    }

    .post-content code {
        background: #f1f5f9;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.9em;
    }

    .post-content pre {
        background: #1e293b;
        color: #e2e8f0;
        padding: 16px 20px;
        border-radius: 8px;
        overflow-x: auto;
        margin: 20px 0;
    }

    .post-content pre code {
        background: none;
        padding: 0;
        color: inherit;
    }

    .post-content img {
        max-width: 100%;
        border-radius: 8px;
        margin: 20px 0;
    }

    .post-content blockquote {
        border-left: 4px solid #6366f1;
        padding-left: 16px;
        margin: 20px 0;
        color: #64748b;
        font-style: italic;
    }

    .post-content ul, .post-content ol {
        margin-bottom: 16px;
        padding-left: 24px;
    }

    .post-content li {
        margin-bottom: 8px;
    }

    .post-content table {
        width: 100%;
        border-collapse: collapse;
        margin: 20px 0;
    }

    .post-content th, .post-content td {
        padding: 10px 14px;
        border: 1px solid #e2e8f0;
        text-align: left;
    }

    .post-content th {
        background: #f8fafc;
        font-weight: 600;
    }

    .post-tags-footer {
        max-width: 800px;
        margin: 0 auto 40px auto;
        padding: 0 24px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
    }

    .post-tags-footer .label {
        color: #64748b;
        font-size: 14px;
        margin-right: 4px;
    }

    .post-tags-footer a {
        display: inline-block;
        background: #eef2ff;
        color: #4338ca;
        font-size: 13px;
        font-weight: 500;
        padding: 3px 10px;
        border-radius: 999px;
        text-decoration: none;
    }

    .post-tags-footer a:hover {
        background: #e0e7ff;
    }
</style>

<article class="post-content">
    {{ content }}
</article>

{% if page.tags and page.tags.size > 0 %}
<div class="post-tags-footer">
    <span class="label">Tags:</span>
    {% for tag in page.tags %}
    <a href="{{ '/blogs/' | prepend: site.baseurl }}#tag={{ tag | downcase | url_encode }}">#{{ tag }}</a>
    {% endfor %}
</div>
{% endif %}
